<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="google" content="notranslate" />
<title>Pizarrón de la oficina</title>
<link rel="stylesheet" href="board.css" />
</head>
<body>
  <div id="name-screen" class="screen">
    <div class="name-card">
      <h1>¿Quién sos?</h1>
      <p>Elegí tu nombre para empezar a usar el pizarrón.</p>
      <div id="name-buttons" class="name-buttons"></div>
    </div>
  </div>

  <div id="app" class="screen hidden">
    <header class="topbar">
      <div class="tabs">
        <button class="tab-btn active" data-tab="board-tab">Pizarrón</button>
        <button class="tab-btn" data-tab="calendar-tab">Calendario</button>
      </div>
      <div class="user-info">
        <span id="current-user-label"></span>
        <button id="change-user-btn" title="Cambiar usuario">Cambiar</button>
      </div>
    </header>

    <section id="board-tab" class="tab-panel active">
      <div class="board-toolbar">
        <button id="add-note-btn">+ Nota</button>
      </div>
      <div id="canvas" class="canvas"></div>
    </section>

    <section id="calendar-tab" class="tab-panel">
      <div class="calendar-toolbar">
        <button id="prev-month-btn">&lsaquo;</button>
        <h2 id="calendar-title"></h2>
        <button id="next-month-btn">&rsaquo;</button>
      </div>
      <div id="calendar-grid" class="calendar-grid"></div>
      <div id="day-tasks-panel" class="day-tasks-panel hidden"></div>
    </section>
  </div>

  <script src="board.js" type="module"></script>
</body>
</html>
